name = "daily-review"
targets = ["codex"]
default_entry = "SKILL.md"
schema_version = 1

[composition]
parents = ["focus"]
children = ["focus", "morning-sync", "spec-new-feature", "excalidraw-diagram"]
formats = ["excalidraw-diagram"]
reads = ["state/collab/roadmap.md", "user-provided PR/review notes"]
writes = ["state/collab/daily-reviews/"]
delegates = ["focus"]
handoffs = ["morning-sync", "focus"]

[contract]
inputs = ["day-end review request", "completed roadmap rows"]
outputs = ["daily review packet", "completed-row drainage summary"]
scripts = []
references = ["../references/output-packet.md", "../references/roadmap-and-handoff-surfaces.md"]
assets = []
state_reads = ["state/collab/roadmap.md"]
state_writes = ["state/collab/daily-reviews/", "state/collab/roadmap.md"]
tools = []

[invoke]
implicit = true
explicit = ["daily-review", "day-end review"]
